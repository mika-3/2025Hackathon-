<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sound→World (Lv1)</title>
  <style>
    body { font-family: system-ui; margin: 16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    canvas { width: 100%; max-width: 900px; height: auto; border: 1px solid #ddd; border-radius: 12px; }
    .card { padding:12px; border:1px solid #eee; border-radius:12px; }
    button { padding:10px 14px; border-radius:10px; border:1px solid #ddd; background:#fff; }
    select, input { padding:10px; border-radius:10px; border:1px solid #ddd; }
    .small { color:#666; font-size:12px; }
  </style>
</head>
<body>
  <h2>🎧 Sound → World（レベル1：観賞型）</h2>

  <div class="card">
    <div class="row">
      <input type="file" id="audio" accept="audio/*" />
      <button id="analyzeBtn">解析（いまはダミー）</button>
      <select id="preset">
        <option value="forest">森（鳥/風）</option>
        <option value="city">都会（車/人）</option>
        <option value="sea">海（波/カモメ）</option>
      </select>
    </div>
    <div class="small">※ 今はダミー結果で世界を生成。次にAI推論APIと接続します。</div>
  </div>

  <div class="card" style="margin-top:12px;">
    <div class="row">
      <div>Scene: <b id="sceneLabel">-</b></div>
      <div>Items: <b id="itemsLabel">-</b></div>
    </div>
  </div>

  <div style="margin-top:12px;">
    <canvas id="c" width="900" height="450"></canvas>
  </div>

  <script src="./game.js"></script>
</body>
</html>
